<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Commvault Lunch Portal | Survey</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" href="styles.css">

    <style>
        /* Responsive container to embed your live survey link directly */
        .embed-container {
            position: relative;
            width: 100%;
            height: 800px; /* Adjust this height if your live form needs more room */
            border-radius: 8px;
            overflow: hidden;
            border: 1px solid #e0e0e0;
        }
        .embed-container iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: 0;
        }
    </style>

</head>

<body>

  <nav class="navbar navbar-expand-lg custom-navbar py-3">

        <div class="container">

            <a class="navbar-brand text-white fw-bold d-flex align-items-center"
               href="index.html">

                <img src="commvault-logo.svg"
                     alt="Commvault Logo"
                     class="navbar-logo me-2">

               

            </a>

            <div class="navbar-nav mx-auto d-flex flex-row gap-4">

                <a class="nav-link active-link"
                   href="index.html">
                     Home
                </a>

                <a class="nav-link text-white-50"
                   href="menu.html">
                     Menu
                </a>

                <a class="nav-link text-white-50"
                   href="survey.html">
                     Survey
                </a>

                <a class="nav-link text-white-50"
                   href="contact.html">
                     Contact
                </a>

            </div>

        </div>

    </nav>
   
    <section class="survey-section py-5">

        <div class="container">

            <div class="survey-card-wrapper bg-white p-5">

                <h2 class="fw-bold mb-2">
                    Food Order Week of June 29, 2026
                </h2>

                <p class="text-secondary mb-4">
                    Please select your lunch preferences below.
                </p>

                <form id="lunchOrderForm">

                    <div class="embed-container mb-4">
                        <iframe src="https://forms.cloud.microsoft/pages/responsepage.aspx?id=OB7tQG6hIkadfEUWG2lp1XnYegb40QxPhJ188IloM8pUOEJEU1UwTkxEQThOOEM0TklVUFNQQ1JJNy4u&origin=lprLink&route=shorturl"
                                allowfullscreen
                                webkitallowfullscreen
                                mozallowfullscreen
                                msallowfullscreen>
                        </iframe>
                    </div>

                    <div class="mt-4">

                        <button type="submit"
                                class="btn btn-submit-survey px-5 text-white">

                            Submit Survey

                        </button>

                    </div>

                </form>

            </div>

        </div>

    </section>

    <div class="modal fade"
         id="successModal"
         tabindex="-1">

        <div class="modal-dialog modal-dialog-centered">

            <div class="modal-content text-center p-4">

                <h3 class="fw-bold">
                    Thank You!
                </h3>

                <p>
                    Your lunch selections have been recorded.
                </p>

                <a href="index.html"
                   class="btn btn-primary-action">

                    Return Home

                </a>

            </div>

        </div>

    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

    <script>

        document.getElementById("lunchOrderForm")
            .addEventListener("submit", function(event) {

                event.preventDefault();

                const successModal =
                    new bootstrap.Modal(
                        document.getElementById("successModal")
                    );

                successModal.show();
            });

    </script>

</body>

</html>
